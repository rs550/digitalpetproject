<!DOCTYPE html>
<html lang="en">
<head>
   <meta name="viewport" content="width=auto, initial-scale=1.0" />
   <title>Digital Pet</title>
   <link rel="stylesheet" href="styleSheet.css"/>
</head>
 
<body>
    
    <div class="container">
        <div class="title" id="petName"><h1>Pet Name</h1></div>
        <div class="scoreRow">Score: <span id="scoreVal">0</span></div>

        <div class="petView"><img id="petView" src="idle.gif" alt="friend"></div>

        <div class="stats">
            <div class="statsContainer">
                <span class="statVal" id="hpVal"></span>
                <div class="barBg"><div class="bar hpBar" id="hpBar"></div></div>
            </div>
            <div class="statsContainer">
                <span class="statVal" id="xpVal"></span>
                <div class="barBg"><div class="bar xpBar" id="xpBar"></div></div>
            </div>
            <div class="statsContainer">
                <span class="statVal" id="apVal"></span>
                <div class="barBg"><div class="bar apBar" id="apBar"></div></div>
            </div>
        </div>

        <div class="buttBar" id="buttBar">    
            <button id="feedB" style="background-color: #e05ce0f3;">Feed</button>
            <button id="sleepB" style="background-color: #7b5ce0f3;">Sleep</button>
            <button id="petB" style="background-color: #5c8ce0f3;">Pet</button>
        </div>
    </div>

    <script src="pet.js"></script>
    <script src="index.js"></script>

</body>
</html>
