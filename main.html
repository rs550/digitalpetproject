<!DOCTYPE html>
<html lang="en">
<head>
   <meta name="viewport" content="width=auto, initial-scale=1.0" />
   <title>Digital Pet</title>
   <link rel="stylesheet" href="styleSheet.css"/>
</head>
 
<body>
    
    <div class="container">
        <div class="title" id="petName"><h1>Pet Name</h1></div>
        <div class="petView"><img id="petView" src="friend.png" alt="friend"></div>

        <div class="stats">
            <div class="statsContainer">
                <span class="statLabel">HP</span>
                <div class="barBg"><div class="bar hpBar" id="hpBar"></div></div>
                <span class="statVal" id="hpVal">100</span>
            </div>
            <div class="statsContainer">
                <span class="statLabel">XP</span>
                <div class="barBg"><div class="bar xpBar" id="xpBar"></div></div>
                <span class="statVal" id="xpVal">100</span>
            </div>
            <div class="statsContainer">
                <span class="statLabel">AP</span>
                <div class="barBg"><div class="bar apBar" id="apBar"></div></div>
                <span class="statVal" id="apVal">50</span>
            </div>
            <div class="scoreRow">Score: <span id="scoreVal">0</span></div>
        </div>

        <div class="buttBar" id="buttBar">
            <button id="feedB">Feed</button>
            <button id="sleepB">Sleep</button>
            <button id="petB">Pet</button>
        </div>
    </div>

    <script src="pet.js"></script>
    <script src="index.js"></script>

</body>
</html>
